<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RTR Dashboard Preview</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0b0f14;
      color: #e9f0f7;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }
    p {
      margin-bottom: 20px;
      color: #97a6b8;
    }
    .preview-container {
      border: 1px solid #2a2f3a;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,0.28);
      margin-bottom: 20px;
    }
    img {
      display: block;
      max-width: 100%;
      height: auto;
    }
    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #ff7a1a, #ff9d53);
      border: none;
      border-radius: 14px;
      color: #16181d;
      font-weight: 800;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      filter: brightness(1.04);
    }
  </style>
</head>
<body>
  <h1>RTR Demo Prototype Dashboard Preview</h1>
  <p>End-to-end demo flow: Leads → Inspections → Photos → Planes → Proposals → Jobs/Invoices</p>

  <div class="preview-container">
    <img src="dashboard_preview.svg" alt="RTR Dashboard Preview" id="svg-image">
  </div>

  <button id="download-png">Download PNG</button>

  <script>
    const img = document.getElementById('svg-image');
    const btn = document.getElementById('download-png');
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      btn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'RTR_Dashboard_Preview.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
    };
  </script>
</body>
</html>
